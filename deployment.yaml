apiVersion: apps/v1
kind: Deployment
metadata:
  name: get-rank-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: get-rank
  template:
    metadata:
      labels:
        app: get-rank
    spec:
      containers:
      - name: get-rank
        image: abdudevolop/get-rank:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: get-rank-service
spec:
  selector:
    app: get-rank
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort